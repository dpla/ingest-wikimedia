<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Page Views - Commons Impact Metrics Data</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Category Page Views - Commons Impact Metrics</h1>

<form id="showForm">
  <label for="showInput">Select category:</label>
  <input
    type="text"
    id="showInput"
    name="show"
    list="showOptions"
    autocomplete="off"
    required
  />
  <datalist id="showOptions"></datalist>

  <button type="submit">Submit</button>
  <div id="errorMessage"></div> <!-- visibility controlled by #errorMessage in styles.css -->

</form>

<form id="show">
  <label for="showInput">Or:</label>
  <button type="submit">Show all</button>
</form>
    
<main id="sections-container">
    <!-- Collapsible category panels are injected here by metrics.js.
         Visibility (display:none by default) is controlled by #sections-container in styles.css. -->
</main>

<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
<script type="text/javascript" src="metrics.js"></script>

</body>
</html>
