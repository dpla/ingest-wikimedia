name: Wikimedia Upload Launch

on:
  workflow_dispatch:
    inputs:
      partner:
        description: "shlex-encoded target list, e.g. 'bpl' or 'bpl pa' or 'bpl \"indiana|Indiana State Library\"'"
        required: true
        type: string
      force:
        description: "Kill existing session if one is already running"
        type: boolean
        default: false
      response_url:
        description: "Slack response_url for ephemeral user feedback on failure"
        required: false
        type: string
        default: ""
      concurrency_key:
        description: "Short SHA256 prefix of the partner string, used as the concurrency group key (set by dispatcher to avoid the 400-char GitHub limit)"
        required: false
        type: string
        default: ""
      max_age_days:
        description: "For refresh runs: re-download files already in S3 if older than N days"
        required: false
        type: string
        default: ""
      refresh_only:
        description: "Download-only refresh run — skip upload phase"
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "wikimedia-launch-${{ github.event.inputs.concurrency_key != '' && github.event.inputs.concurrency_key || github.run_id }}"
  cancel-in-progress: false

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - run: pip install boto3==1.42.87 requests==2.32.5

      - name: Launch pipeline
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.WIKIMEDIA_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.WIKIMEDIA_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          DPLA_SLACK_BOT_TOKEN: ${{ secrets.DPLA_SLACK_BOT_TOKEN }}
          PYTHONPATH: .
        run: |
          python scripts/wikimedia_launch.py \
            --partner "${{ github.event.inputs.partner }}" \
            --force "${{ github.event.inputs.force }}" \
            --response-url "${{ github.event.inputs.response_url }}" \
            --max-age-days "${{ github.event.inputs.max_age_days }}" \
            --refresh-only "${{ github.event.inputs.refresh_only }}"
