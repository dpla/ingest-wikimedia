name: Wikimedia Upload Launch

on:
  workflow_dispatch:
    inputs:
      partner:
        description: "shlex-encoded target list, e.g. 'bpl' or 'bpl pa' or 'bpl \"indiana|Indiana State Library\"'"
        required: true
        type: string
      force:
        description: "Kill existing session if one is already running"
        type: boolean
        default: false
      response_url:
        description: "Slack response_url for ephemeral user feedback on failure"
        required: false
        type: string
        default: ""
      concurrency_key:
        description: "Short SHA256 prefix of the partner string, used as the concurrency group key (set by dispatcher to avoid the 400-char GitHub limit)"
        required: false
        type: string
        default: ""
      max_age_days:
        description: "For refresh runs: re-download files already in S3 if older than N days"
        required: false
        type: string
        default: ""
      refresh_only:
        description: "Download-only refresh run — skip upload phase"
        type: boolean
        default: false
      sdc_only:
        description: "SDC-only backfill — skip download + upload phases, just re-enumerate IDs and run sdc-sync"
        type: boolean
        default: false
      maintain:
        description: "Maintain mode — reconcile EXISTING Commons files of a (possibly no-longer-participating) hub/institution; never creates new files. DEFAULT = hash: download + content re-link/overwrite + SDC. Add 'lite' for the quick no-download sidecar route."
        type: boolean
        default: false
      lite:
        description: "Lite maintain — quick no-download sidecar route (SDC-in-place + name-drift rename only); requires maintain"
        type: boolean
        default: false
      count_only:
        description: "Maintain pre-flight sizing — resolve how each file would re-link and print a per-anchor breakdown; writes nothing (requires maintain)"
        type: boolean
        default: false
      workers:
        description: "SDC-sync worker processes per session (parallelism). 1 = single-process."
        required: false
        type: string
        default: "24"
      workers_budget:
        description: "Box-wide cap on concurrent SDC worker slots across all sessions (0 = unlimited)"
        required: false
        type: string
        default: "24"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "wikimedia-launch-${{ github.event.inputs.concurrency_key != '' && github.event.inputs.concurrency_key || github.run_id }}"
  cancel-in-progress: false

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Don't leave a writable GITHUB_TOKEN in the runner for later steps.
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - run: pip install boto3==1.42.87 requests==2.32.5

      - name: Launch pipeline
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.WIKIMEDIA_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.WIKIMEDIA_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          DPLA_SLACK_BOT_TOKEN: ${{ secrets.DPLA_SLACK_BOT_TOKEN }}
          PYTHONPATH: .
          INPUT_PARTNER: ${{ github.event.inputs.partner }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
          INPUT_RESPONSE_URL: ${{ github.event.inputs.response_url }}
          INPUT_MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days }}
          INPUT_REFRESH_ONLY: ${{ github.event.inputs.refresh_only }}
          INPUT_SDC_ONLY: ${{ github.event.inputs.sdc_only }}
          INPUT_MAINTAIN: ${{ github.event.inputs.maintain }}
          INPUT_LITE: ${{ github.event.inputs.lite }}
          INPUT_COUNT_ONLY: ${{ github.event.inputs.count_only }}
          INPUT_WORKERS: ${{ github.event.inputs.workers }}
          INPUT_WORKERS_BUDGET: ${{ github.event.inputs.workers_budget }}
        run: |
          python scripts/wikimedia_launch.py \
            --partner "$INPUT_PARTNER" \
            --force "$INPUT_FORCE" \
            --response-url "$INPUT_RESPONSE_URL" \
            --max-age-days "$INPUT_MAX_AGE_DAYS" \
            --refresh-only "$INPUT_REFRESH_ONLY" \
            --sdc-only "$INPUT_SDC_ONLY" \
            --maintain "$INPUT_MAINTAIN" \
            --lite "$INPUT_LITE" \
            --count-only "$INPUT_COUNT_ONLY" \
            --workers "$INPUT_WORKERS" \
            --workers-budget "$INPUT_WORKERS_BUDGET"
