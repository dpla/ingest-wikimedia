name: CIM Pageviews Bot

on:
  schedule:
    - cron: '0 8 * * *'      # daily – categories mode
    - cron: '0 8 1,7 * *'    # 1st and 7th of each month – data mode
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'data'
        type: choice
        options: [data, categories]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  categories:
    name: Category request management
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'categories') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Don't leave a writable GITHUB_TOKEN in the runner for later steps.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.5.3"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Create pywikibot password file
        env:
          PYWIKIBOT_PASSWORD: ${{ secrets.PYWIKIBOT_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          Path("metrics/cim-pageviews/user-password.py").write_text(
              f"('DPLA bot', BotPassword('PARTNER_UPLOADS', {os.environ['PYWIKIBOT_PASSWORD']!r}))\n",
              encoding="utf-8",
          )
          PY

      - name: Run categories mode
        env:
          PYWIKIBOT_DIR: ${{ github.workspace }}/metrics/cim-pageviews
        run: uv run python metrics/cim-pageviews/CIMviews.py --mode categories

  data:
    name: Update pageview data
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'data') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 8 1,7 * *')
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Don't leave a writable GITHUB_TOKEN in the runner for later steps.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.5.3"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Create pywikibot password file
        env:
          PYWIKIBOT_PASSWORD: ${{ secrets.PYWIKIBOT_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          Path("metrics/cim-pageviews/user-password.py").write_text(
              f"('DPLA bot', BotPassword('PARTNER_UPLOADS', {os.environ['PYWIKIBOT_PASSWORD']!r}))\n",
              encoding="utf-8",
          )
          PY

      - name: Run data mode
        env:
          PYWIKIBOT_DIR: ${{ github.workspace }}/metrics/cim-pageviews
        run: uv run python metrics/cim-pageviews/CIMviews.py
