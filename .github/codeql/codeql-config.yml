name: "DPLA ingest-wikimedia CodeQL config"

# Match GitHub's default-setup behavior — use the default code-scanning query
# suite. Switching from default setup to advanced setup is what lets us add
# rule-level exclusions; otherwise this repo has no other reason to customize.

query-filters:
  # Exclude the clear-text-logging / clear-text-storage "sensitive data"
  # heuristics for Python.
  #
  # In every historical and current finding for this repo, these rules have
  # been triggered by:
  #   1. The literal string "dpla_api_key" used as a config-file or env-var
  #      lookup key. CodeQL's SensitiveDataSource classifier treats any name
  #      containing "key" / "token" / "credential" / "password" / "secret"
  #      as a credential.
  #   2. CodeQL then conservatively propagates taint through the URL built
  #      with that value into the response body returned by api.dp.la.
  #   3. Any subsequent print() of values derived from that response — Q-IDs,
  #      DPLA item hashes, Commons file paths, license URIs — is flagged as
  #      "logs sensitive data."
  #
  # The DPLA data/search API key is a publicly issued, rate-limited identifier
  # — not a password-class credential — and the actually-logged values are
  # non-secret metadata. Genuine credential-leak coverage remains in place via
  # py/hardcoded-credentials and the broader py/clear-text-* family.
  - exclude:
      id: py/clear-text-logging-sensitive-data
  - exclude:
      id: py/clear-text-storage-sensitive-data
